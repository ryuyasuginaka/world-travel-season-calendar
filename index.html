<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="世界60以上の地域の旅行ベストシーズンを月別に一覧できるカレンダー。行きたい月から旅行先を探せます。">
  <title>世界旅行 ベストシーズンカレンダー</title>
  <style>
    :root {
      --best: #2ecc71;
      --good: #f1c40f;
      --avoid: #e74c3c;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --header-bg: #1e3a5f;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --border: #334155;
      --region-header: #0ea5e9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button { font-family: inherit; }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      padding: 48px 20px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(56,189,248,0.15) 0%, transparent 70%);
    }

    .hero h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      margin-bottom: 12px;
    }

    .hero h1 .h1-emoji {
      -webkit-text-fill-color: initial;
      background: none;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 0.95rem;
      position: relative;
      max-width: 600px;
      margin: 0 auto 24px;
    }

    /* ===== LEGEND ===== */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      position: relative;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
    }

    /* ===== FILTER BAR ===== */
    .filter-bar {
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      max-width: 1400px;
      margin: 0 auto;
    }

    .filter-row + .filter-row { margin-top: 10px; }

    .filter-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f172a;
      font-weight: 700;
    }

    .month-highlight {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .month-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    .month-btn:hover,
    .month-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f172a;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      padding: 7px 14px 7px 34px;
      width: 210px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text-muted); }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      pointer-events: none;
      opacity: 0.7;
    }

    .toggle-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .toggle-btn.active {
      background: var(--best);
      border-color: var(--best);
      color: #064e3b;
      font-weight: 700;
    }

    .toggle-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ===== MAIN ===== */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    /* ===== STATS ===== */
    .stats-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
      min-width: 120px;
    }

    .stat-num {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* ===== RECOMMEND PANEL ===== */
    .recommend {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--best);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: none;
    }

    .recommend.show { display: block; }

    .recommend-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .recommend-title .count { color: var(--best); }

    .recommend-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .rec-chip {
      background: rgba(46, 204, 113, 0.12);
      border: 1px solid rgba(46, 204, 113, 0.4);
      color: var(--text);
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .rec-chip:hover {
      background: rgba(46, 204, 113, 0.3);
      border-color: var(--best);
    }

    /* ===== REGION SECTION ===== */
    .region-section { margin-bottom: 36px; }

    .region-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--region-header);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      padding-left: 12px;
      border-left: 3px solid var(--region-header);
    }

    /* ===== CALENDAR TABLE ===== */
    .calendar-wrapper {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--card-bg);
      min-width: 720px;
    }

    thead th {
      background: var(--header-bg);
      padding: 10px 6px;
      font-size: 0.72rem;
      font-weight: 700;
      text-align: center;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }

    thead th:first-child {
      text-align: left;
      padding-left: 14px;
      min-width: 168px;
      color: var(--text);
      left: 0;
      z-index: 3;
    }

    tbody tr td { border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }

    tbody td {
      padding: 0;
      text-align: center;
      transition: background 0.15s;
    }

    tbody td:first-child {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      background: var(--card-bg);
      position: sticky;
      left: 0;
      z-index: 2;
      box-shadow: 1px 0 0 var(--border);
    }

    tr.flash td:first-child { animation: flashRow 1.6s ease; }

    @keyframes flashRow {
      0%, 60% { background: rgba(56,189,248,0.25); }
      100% { background: var(--card-bg); }
    }

    .cell {
      width: 100%;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: default;
      transition: filter 0.15s;
      position: relative;
    }

    .cell:hover { filter: brightness(1.18); }

    .cell.r3 { background: var(--best); color: #064e3b; }
    .cell.r2 { background: var(--good); color: #78350f; }
    .cell.r1 { background: var(--avoid); color: #7f1d1d; }

    td.highlight-col .cell {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    td.dim-col .cell { filter: saturate(0.45) brightness(0.72); }
    td.dim-col:first-child { filter: none; }

    /* ===== TOOLTIP (shared, works on tap too) ===== */
    #tooltip {
      position: fixed;
      background: #0b1220;
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 7px 11px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      max-width: 240px;
      z-index: 300;
      pointer-events: none;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      line-height: 1.5;
    }

    #tooltip .tip-month {
      color: var(--accent);
      font-weight: 700;
      margin-right: 6px;
    }

    /* ===== FAVORITES ===== */
    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0 6px 0 0;
      color: #475569;
      transition: color 0.15s, transform 0.15s;
    }

    .fav-btn:hover { color: #fbbf24; transform: scale(1.2); }
    .fav-btn.on { color: #fbbf24; }

    .dest-name { cursor: pointer; }
    .dest-name:hover { color: var(--accent); text-decoration: underline; }

    #fav-section { display: none; }
    #fav-section.show { display: block; }
    #fav-section .region-title { color: #fbbf24; border-left-color: #fbbf24; }

    /* ===== DETAIL MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.75);
      z-index: 400;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 560px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 22px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .modal h3 { font-size: 1.2rem; margin-bottom: 2px; }

    .modal .modal-region {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    .modal-close {
      float: right;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .modal-close:hover { border-color: var(--accent); color: var(--accent); }

    .modal-best { font-size: 0.82rem; margin-bottom: 14px; }
    .modal-best b { color: var(--best); }

    .modal-strip {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 3px;
      margin-bottom: 16px;
    }

    .modal-strip .ms {
      border-radius: 6px;
      text-align: center;
      padding: 5px 0 3px;
      font-size: 0.68rem;
      font-weight: 700;
    }

    .modal-strip .ms small {
      display: block;
      font-size: 0.62rem;
      font-weight: 600;
    }

    .modal-strip .ms.r3 { background: var(--best); color: #064e3b; }
    .modal-strip .ms.r2 { background: var(--good); color: #78350f; }
    .modal-strip .ms.r1 { background: var(--avoid); color: #7f1d1d; }

    .modal-months { list-style: none; }

    .modal-months li {
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .modal-months li:last-child { border-bottom: none; }

    .modal-months .mm {
      min-width: 36px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.75rem;
    }

    .modal-months .sym { font-weight: 700; min-width: 18px; }
    .sym.s3 { color: var(--best); }
    .sym.s2 { color: var(--good); }
    .sym.s1 { color: var(--avoid); }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: none;
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-state.show { display: block; }

    .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      line-height: 1.8;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .filter-bar { padding: 10px 8px; }
      .filter-row { gap: 6px; }
      .month-btn { width: 30px; height: 30px; font-size: 0.65rem; }
      .search-box input { width: 160px; }
      .hero { padding: 36px 16px 24px; }
      tbody td:first-child { min-width: 140px; font-size: 0.78rem; }

      /* スクロール中は月選択だけ残してコンパクト化（スティッキーバーの画面占有を防ぐ） */
      .filter-bar.compact .filter-row:first-child,
      .filter-bar.compact .search-box,
      .filter-bar.compact .filter-label { display: none; }
      .filter-bar.compact .filter-row + .filter-row { margin-top: 0; }
    }
  </style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <h1><span class="h1-emoji">🌍</span> 世界旅行 ベストシーズンカレンダー</h1>
  <p>世界<span id="hero-count">45</span>地域の観光ベストシーズンを月別に一覧。「行きたい月」からも「行きたい場所」からも探せます。</p>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--best);color:#064e3b">◎</div>
      <span>ベストシーズン</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--good);color:#78350f">△</div>
      <span>まずまず / 肩シーズン</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--avoid);color:#7f1d1d">×</div>
      <span>避けるべき時期</span>
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<nav class="filter-bar" aria-label="フィルタ">
  <div class="filter-row">
    <span class="filter-label">地域</span>
    <div id="region-btns" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">月</span>
    <div class="month-highlight" id="month-btns"></div>
    <button class="toggle-btn" id="best-only" aria-pressed="false" disabled>◎のみ表示</button>
    <div class="search-box">
      <input type="search" id="search" placeholder="目的地を検索…" aria-label="目的地を検索">
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="stats-bar" id="stats"></div>
  <div class="recommend" id="recommend" aria-live="polite"></div>
  <div id="fav-section"></div>
  <div id="sections"></div>
  <div class="empty-state" id="empty">
    <div class="big">🧳</div>
    <p>条件に合う目的地が見つかりませんでした。<br>検索条件やフィルタを変えてみてください。</p>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <p>※ このカレンダーは一般的な気候傾向に基づいています。実際の天候は年によって異なります。旅行前に最新の現地情報をご確認ください。</p>
  <p>◎ ベストシーズン ｜ △ まずまず ｜ × 避けるべき時期</p>
  <p><a href="https://github.com/ryuyasuginaka/world-travel-season-calendar" target="_blank" rel="noopener">GitHub</a></p>
</footer>

<div id="tooltip" role="tooltip"></div>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal"></div>
</div>

<script>

const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const SYMBOLS = { 3: '◎', 2: '△', 1: '×' };
const RATING_LABELS = { 3: 'ベストシーズン', 2: 'まずまず', 1: '避けるべき時期' };

// ===================== STATE =====================
const state = {
  region: 'all',
  month: null,     // 0-11 or null
  bestOnly: false,
  query: '',
};

// ===================== FAVORITES: STATE =====================
const FAVS = new Set(JSON.parse(localStorage.getItem('wtsc-favs') || '[]'));

function saveFavs() {
  localStorage.setItem('wtsc-favs', JSON.stringify([...FAVS]));
}

// ===================== RENDER: SHARED PARTS =====================
function cellsHtml(d) {
  return d.m.map(([rating, tip], mi) =>
    `<td data-m="${mi}"><div class="cell r${rating}" tabindex="0" data-tip="${tip}" data-mi="${mi}" role="img" aria-label="${d.n} ${MONTH_NAMES[mi]}: ${RATING_LABELS[rating]}（${tip}）">${SYMBOLS[rating]}</div></td>`
  ).join('');
}

function nameCellHtml(idx) {
  const d = DATA[idx];
  const on = FAVS.has(d.n);
  return `<td><button class="fav-btn${on ? ' on' : ''}" data-fi="${idx}" aria-pressed="${on}" title="お気に入りに追加/解除">★</button><span class="dest-name" data-di="${idx}" title="クリックで詳細表示">${d.n}</span></td>`;
}

function theadHtml() {
  return `<thead><tr><th>地域 / 国</th>${MONTH_NAMES.map((m, i) => `<th data-m="${i}">${m}</th>`).join('')}</tr></thead>`;
}

// ===================== RENDER: SECTIONS =====================
function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = REGIONS.map(region => {
    const rows = DATA.map((d, idx) => ({ d, idx }))
      .filter(({ d }) => d.r === region.k)
      .map(({ d, idx }) => `<tr data-idx="${idx}" data-region="${d.r}" id="dest-${idx}">${nameCellHtml(idx)}${cellsHtml(d)}</tr>`)
      .join('');
    return `<section class="region-section" data-region="${region.k}">
      <h2 class="region-title">${region.t}</h2>
      <div class="calendar-wrapper">
        <table>${theadHtml()}<tbody>${rows}</tbody></table>
      </div>
    </section>`;
  }).join('');
}

// ===================== RENDER: FAVORITES SECTION =====================
function renderFavSection() {
  const sec = document.getElementById('fav-section');
  const favs = DATA.map((d, i) => ({ d, i })).filter(({ d }) => FAVS.has(d.n));
  sec.classList.toggle('show', favs.length > 0);
  if (!favs.length) { sec.innerHTML = ''; return; }
  const rows = favs.map(({ d, i }) => `<tr data-fav-row>${nameCellHtml(i)}${cellsHtml(d)}</tr>`).join('');
  sec.innerHTML = `<section class="region-section">
    <h2 class="region-title">⭐ お気に入り比較（${favs.length}件）</h2>
    <div class="calendar-wrapper">
      <table>${theadHtml()}<tbody>${rows}</tbody></table>
    </div>
  </section>`;
}

function toggleFav(idx) {
  const name = DATA[idx].n;
  const on = !FAVS.has(name);
  if (on) FAVS.add(name); else FAVS.delete(name);
  saveFavs();
  document.querySelectorAll(`.fav-btn[data-fi="${idx}"]`).forEach(b => {
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on);
  });
  applyFilters(); // お気に入りテーブルの再構築と列ハイライトの再適用
}

// ===================== RENDER: FILTER BUTTONS =====================
function renderFilters() {
  const regionBtns = document.getElementById('region-btns');
  regionBtns.innerHTML =
    `<button class="filter-btn active" data-region="all">すべて</button>` +
    REGIONS.map(r => `<button class="filter-btn" data-region="${r.k}">${r.t.replace(/^\S+\s/, '')}</button>`).join('');
  regionBtns.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => { state.region = btn.dataset.region; applyFilters(); });
  });

  const monthBtns = document.getElementById('month-btns');
  monthBtns.innerHTML = MONTH_NAMES.map((_, i) =>
    `<button class="month-btn" data-m="${i}" aria-pressed="false">${i + 1}</button>`
  ).join('');
  monthBtns.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const m = Number(btn.dataset.m);
      state.month = state.month === m ? null : m;
      if (state.month === null) state.bestOnly = false;
      applyFilters();
    });
  });

  document.getElementById('best-only').addEventListener('click', () => {
    state.bestOnly = !state.bestOnly;
    applyFilters();
  });

  document.getElementById('search').addEventListener('input', e => {
    state.query = e.target.value.trim();
    applyFilters();
  });
}

// ===================== APPLY FILTERS =====================
function applyFilters() {
  const q = state.query.toLowerCase();

  renderFavSection(); // 先に再構築（後段の列ハイライトを効かせるため）

  // region buttons
  document.querySelectorAll('#region-btns .filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.region === state.region));

  // month buttons
  document.querySelectorAll('.month-btn').forEach(b => {
    const on = Number(b.dataset.m) === state.month;
    b.classList.toggle('active', on);
    b.setAttribute('aria-pressed', on);
  });

  // best-only toggle
  const bestBtn = document.getElementById('best-only');
  bestBtn.disabled = state.month === null;
  bestBtn.classList.toggle('active', state.bestOnly);
  bestBtn.setAttribute('aria-pressed', state.bestOnly);
  bestBtn.textContent = state.month === null ? '◎のみ表示' : `${state.month + 1}月が◎のみ`;

  // column highlight
  document.querySelectorAll('th[data-m], td[data-m]').forEach(el => {
    const m = Number(el.dataset.m);
    el.classList.toggle('highlight-col', state.month === m);
    el.classList.toggle('dim-col', state.month !== null && state.month !== m && el.tagName === 'TD');
  });

  // rows
  let visibleCount = 0;
  document.querySelectorAll('tr[data-idx]').forEach(tr => {
    const d = DATA[Number(tr.dataset.idx)];
    let show = state.region === 'all' || d.r === state.region;
    if (show && q) show = d.n.toLowerCase().includes(q);
    if (show && state.bestOnly && state.month !== null) show = d.m[state.month][0] === 3;
    tr.style.display = show ? '' : 'none';
    if (show) visibleCount++;
  });

  // hide empty sections
  document.querySelectorAll('.region-section').forEach(sec => {
    const anyVisible = [...sec.querySelectorAll('tr[data-idx]')].some(tr => tr.style.display !== 'none');
    sec.style.display = anyVisible ? '' : 'none';
  });

  document.getElementById('empty').classList.toggle('show', visibleCount === 0);

  renderStats();
  renderRecommend();
  syncHash();
}

// ===================== STATS =====================
function renderStats() {
  const m = state.month !== null ? state.month : new Date().getMonth();
  const bestCount = DATA.filter(d => d.m[m][0] === 3).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${DATA.length}</div><div class="stat-label">掲載地域数</div></div>
    <div class="stat-card"><div class="stat-num">${REGIONS.length}</div><div class="stat-label">大エリア</div></div>
    <div class="stat-card"><div class="stat-num">${bestCount}</div><div class="stat-label">${m + 1}月が◎の地域</div></div>`;
}

// ===================== RECOMMEND PANEL =====================
function renderRecommend() {
  const panel = document.getElementById('recommend');
  if (state.month === null) { panel.classList.remove('show'); return; }
  const m = state.month;
  const picks = DATA
    .map((d, i) => ({ d, i }))
    .filter(({ d }) => d.m[m][0] === 3 && (state.region === 'all' || d.r === state.region));
  panel.classList.add('show');
  panel.innerHTML = `
    <div class="recommend-title">✈️ ${m + 1}月がベストシーズンの地域 <span class="count">${picks.length}件</span></div>
    <div class="recommend-chips">${picks.map(({ d, i }) =>
      `<button class="rec-chip" data-target="dest-${i}">${d.n}</button>`).join('') || '<span style="color:var(--text-muted);font-size:0.8rem">該当なし</span>'}
    </div>`;
  panel.querySelectorAll('.rec-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const row = document.getElementById(chip.dataset.target);
      if (!row) return;
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      row.classList.remove('flash');
      requestAnimationFrame(() => row.classList.add('flash'));
    });
  });
}

// ===================== TOOLTIP (hover + tap) =====================
const tooltip = document.getElementById('tooltip');

function showTooltip(cell) {
  const mi = Number(cell.dataset.mi);
  tooltip.innerHTML = `<span class="tip-month">${MONTH_NAMES[mi]}</span>${cell.dataset.tip}`;
  tooltip.style.display = 'block';
  const rect = cell.getBoundingClientRect();
  const tw = tooltip.offsetWidth;
  let left = rect.left + rect.width / 2 - tw / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
  let top = rect.top - tooltip.offsetHeight - 8;
  if (top < 8) top = rect.bottom + 8;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip() { tooltip.style.display = 'none'; }

document.addEventListener('mouseover', e => {
  const cell = e.target.closest('.cell');
  if (cell) showTooltip(cell); else hideTooltip();
});
document.addEventListener('click', e => {
  const cell = e.target.closest('.cell');
  if (cell) { showTooltip(cell); e.stopPropagation(); } else hideTooltip();
});
document.addEventListener('focusin', e => {
  const cell = e.target.closest('.cell');
  if (cell) showTooltip(cell); else hideTooltip();
});
window.addEventListener('scroll', hideTooltip, { passive: true });

// ===================== DETAIL MODAL =====================
const modalOverlay = document.getElementById('modal-overlay');
const modalEl = document.getElementById('modal');

function openModal(idx) {
  const d = DATA[idx];
  const region = REGIONS.find(r => r.k === d.r);
  const bestMonths = d.m.map(([r], i) => r === 3 ? (i + 1) + '月' : null).filter(Boolean);
  modalEl.innerHTML = `
    <button class="modal-close" aria-label="閉じる">✕</button>
    <h3>${d.n}</h3>
    <div class="modal-region">${region ? region.t : ''}</div>
    <div class="modal-best">ベストシーズン: <b>${bestMonths.join('・') || 'なし'}</b></div>
    <div class="modal-strip">${d.m.map(([r], i) =>
      `<div class="ms r${r}">${i + 1}<small>${SYMBOLS[r]}</small></div>`).join('')}</div>
    <ul class="modal-months">${d.m.map(([r, tip], i) =>
      `<li><span class="mm">${MONTH_NAMES[i]}</span><span class="sym s${r}">${SYMBOLS[r]}</span><span>${tip}</span></li>`).join('')}</ul>`;
  modalOverlay.classList.add('show');
  modalEl.querySelector('.modal-close').focus();
}

function closeModal() { modalOverlay.classList.remove('show'); }

modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
modalEl.addEventListener('click', e => { if (e.target.closest('.modal-close')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===================== FAV / DETAIL CLICK DELEGATION =====================
document.addEventListener('click', e => {
  const favBtn = e.target.closest('.fav-btn');
  if (favBtn) { toggleFav(Number(favBtn.dataset.fi)); return; }
  const name = e.target.closest('.dest-name');
  if (name) openModal(Number(name.dataset.di));
});

// ===================== URL HASH SYNC =====================
let hashSyncEnabled = false;

function syncHash() {
  if (!hashSyncEnabled) return;
  const params = new URLSearchParams();
  if (state.region !== 'all') params.set('r', state.region);
  if (state.month !== null) params.set('m', state.month + 1);
  if (state.bestOnly) params.set('best', '1');
  if (state.query) params.set('q', state.query);
  const str = params.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  if (!location.hash) return false;
  const params = new URLSearchParams(location.hash.slice(1));
  let loaded = false;
  const r = params.get('r');
  if (r && REGIONS.some(x => x.k === r)) { state.region = r; loaded = true; }
  const m = Number(params.get('m'));
  if (m >= 1 && m <= 12) { state.month = m - 1; loaded = true; }
  if (params.get('best') === '1' && state.month !== null) { state.bestOnly = true; loaded = true; }
  const q = params.get('q');
  if (q) { state.query = q; document.getElementById('search').value = q; loaded = true; }
  return loaded;
}

// ===================== MOBILE: COMPACT FILTER BAR =====================
const filterBar = document.querySelector('.filter-bar');
window.addEventListener('scroll', () => {
  const compact = window.innerWidth <= 600 && window.scrollY > 250;
  filterBar.classList.toggle('compact', compact);
}, { passive: true });

// ===================== INIT =====================
document.getElementById('hero-count').textContent = DATA.length;
renderSections();
renderFilters();
if (!loadHash()) {
  state.month = new Date().getMonth(); // 今月を初期ハイライト
}
applyFilters();
hashSyncEnabled = true;
syncHash();
